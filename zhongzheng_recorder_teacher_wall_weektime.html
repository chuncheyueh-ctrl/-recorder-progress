<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>中正國小直笛團｜教師交接看板</title>
<style>
:root{--bg:#f6f3ec;--card:#fff;--text:#2b2620;--muted:#756b60;--line:#e5ddd1;--primary:#8b5e34;--dark:#654120;--soft:#fff7ea;--green:#2f8f62;--orange:#c47b20;--red:#b94a48;--shadow:0 8px 24px rgba(70,48,28,.08);--radius:20px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.5}
header{position:sticky;top:0;z-index:20;background:rgba(246,243,236,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px}
h1{font-size:21px;margin:0;font-weight:900}.sub{font-size:13px;color:var(--muted);margin-top:3px}
main{max-width:900px;margin:0 auto;padding:14px 14px 90px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;margin-bottom:12px}
h2{font-size:19px;margin:0 0 10px}h3{font-size:16px;margin:0 0 6px}
button,input,textarea,select{font:inherit}button{border:0;border-radius:999px;padding:10px 14px;background:var(--primary);color:#fff;font-weight:800;min-height:42px}button.secondary{background:#fff;color:var(--dark);border:1px solid var(--line)}button.ghost{background:transparent;color:var(--dark);border:1px solid var(--line)}button.danger{background:var(--red)}
.row{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.badge{display:inline-flex;border-radius:999px;padding:5px 9px;background:#efe6d9;color:var(--dark);font-size:12px;font-weight:900}.badge.green{background:#e2f5ea;color:var(--green)}.badge.orange{background:#fff0d8;color:var(--orange)}
.muted{color:var(--muted);font-size:13px}.empty{padding:12px;border:1px dashed var(--line);border-radius:15px;color:var(--muted);background:#fffdf8}
.stat{background:#fffdf8;border:1px solid var(--line);border-radius:15px;padding:10px;text-align:center}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}
.teacher-grid{display:grid;gap:10px}.teacher-card{border:1px solid var(--line);border-radius:18px;background:#fffdf8;padding:13px}.teacher-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.teacher-name{font-size:18px;font-weight:950}.teacher-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.teacher-actions button{min-height:34px;padding:7px 10px;font-size:13px}
.note{border:1px solid var(--line);border-radius:15px;background:white;padding:10px;margin-top:8px}.note.handoff{border-left:5px solid var(--primary);background:var(--soft)}.note p{margin:5px 0;font-size:14px}.note-meta{font-size:12px;color:var(--muted);margin-bottom:4px}
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}.tab{white-space:nowrap;background:#fff;color:var(--dark);border:1px solid var(--line)}.tab.active{background:var(--primary);color:#fff}
.slot{border:1px solid var(--line);border-radius:16px;background:#fffdf8;padding:12px;margin-bottom:9px}.slot-top{display:flex;justify-content:space-between;gap:8px}
.form{display:grid;gap:11px}label{font-size:14px;font-weight:900;display:grid;gap:5px}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:10px 12px;background:#fff;color:var(--text)}textarea{min-height:82px;resize:vertical}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:13px;padding:8px;background:#fff}.check input{width:auto}
dialog{width:min(720px,calc(100vw - 22px));border:0;border-radius:22px;padding:0;box-shadow:0 20px 60px rgba(0,0,0,.24)}dialog::backdrop{background:rgba(0,0,0,.35)}.modal-head{padding:16px;border-bottom:1px solid var(--line);background:#fff7ea;border-radius:22px 22px 0 0}.modal-body{padding:16px;max-height:72vh;overflow:auto}.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;padding:14px 16px;border-top:1px solid var(--line)}
.fab{position:fixed;right:16px;bottom:18px;z-index:30;box-shadow:0 8px 25px rgba(0,0,0,.22)}
@media(min-width:760px){.teacher-grid{grid-template-columns:1fr 1fr}.checks{grid-template-columns:repeat(4,1fr)}.grid2{grid-template-columns:repeat(4,auto);justify-content:start}}
</style>
</head>
<body>
<header><h1>中正國小直笛團｜教師交接看板</h1><div class="sub">第幾週＋日期追蹤，每位老師一個方塊</div></header>
<main>
<section class="card">
 <div class="row">
  <button class="secondary" id="prevWeek">上一週</button>
  <div><h2 id="weekLabel" style="margin:0"></h2><div class="muted">目前是手機本機版；多人即時同步下一步接 Firebase。</div></div>
  <button class="secondary" id="nextWeek">下一週</button>
 </div>
 <div class="grid2" style="margin-top:12px">
  <button id="openPlan">填寫本週進度</button>
  <button class="secondary" id="addTeacherBtn">新增老師</button>
  <button class="ghost" id="exportBtn">匯出紀錄</button>
  <button class="ghost" id="clearBtn">清除本週資料</button>
 </div>
</section>


<section class="card" style="background:#fff7ea">
 <div class="row">
  <div>
   <div class="muted">目前週次</div>
   <h2 id="bigWeekLabel" style="margin:0;font-size:22px"></h2>
  </div>
  <span class="badge green" id="bigWeekBadge"></span>
 </div>
</section>

<section class="card">
 <div class="row"><h2>本週總進度</h2><span class="badge" id="planStatus">尚未填寫</span></div>
 <div id="planView" class="empty">主要教學老師尚未填寫本週大綱。</div>
</section>

<section class="card">
 <div class="row">
  <h2>老師教學進度牆</h2>
  <span class="badge green" id="teacherCount">0 位老師</span>
 </div>
 <div class="muted" style="margin-bottom:8px">每位老師都有自己的方塊。點「新增紀錄」後，內容會存在該老師卡片裡，並顯示日期與填寫時間。</div>
 <div id="teacherWall" class="teacher-grid"></div>
</section>

<section class="card">
 <h2>交接提醒區</h2>
 <div class="muted" style="margin-bottom:8px">集中顯示所有老師交代「下一位老師」的內容。</div>
 <div id="handoffList"></div>
</section>

<section class="card">
 <h2>依日期與時段查看</h2>
 <div class="grid3" style="margin-bottom:10px">
  <div class="stat"><b id="slotCount">0</b><span>本週時段</span></div>
  <div class="stat"><b id="doneCount">0</b><span>已填時段</span></div>
  <div class="stat"><b id="todoCount">0</b><span>未填時段</span></div>
 </div>
 <div class="tabs" id="tabs"></div>
 <div id="slotList"></div>
</section>
</main>

<button class="fab" id="quickAdd">＋ 新增紀錄</button>

<dialog id="teacherDialog">
<form method="dialog" id="teacherForm">
 <div class="modal-head"><div class="row"><div><h2 id="teacherDialogTitle">新增老師</h2><div class="muted">新增後會在首頁出現老師方塊。</div></div><button type="button" class="secondary" onclick="teacherDialog.close()">關閉</button></div></div>
 <div class="modal-body form">
  <label>老師姓名<input id="teacherNameInput" placeholder="例：岳老師、王老師" required></label>
  <label>備註／常負責聲部<input id="teacherNoteInput" placeholder="例：常帶高音笛一部、低音聲部"></label>
 </div>
 <div class="actions"><button type="submit">儲存老師</button></div>
</form>
</dialog>

<dialog id="planDialog">
<form method="dialog" id="planForm">
 <div class="modal-head"><div class="row"><div><h2>本週總進度</h2><div class="muted">給所有老師看的本週方向。</div></div><button type="button" class="secondary" onclick="planDialog.close()">關閉</button></div></div>
 <div class="modal-body form">
  <label>本週目標<textarea id="goal" placeholder="例：完成比賽曲 A-B 段。"></textarea></label>
  <label>目前整體進度<textarea id="overall" placeholder="例：A段已能合奏，B段仍需分部。"></textarea></label>
  <label>主要曲目／段落<textarea id="pieces" placeholder="例：《小步舞曲》A-B段、G大調音階。"></textarea></label>
  <label>本週提醒<textarea id="notes" placeholder="例：週五社團課要總排。"></textarea></label>
  <label>填寫老師<input id="planTeacher" placeholder="例：岳老師"></label>
 </div>
 <div class="actions"><button type="submit">儲存本週總進度</button></div>
</form>
</dialog>

<dialog id="recordDialog">
<form method="dialog" id="recordForm">
 <div class="modal-head"><div class="row"><div><h2>新增教學紀錄</h2><div class="muted" id="recordWhen"></div></div><button type="button" class="secondary" onclick="recordDialog.close()">關閉</button></div></div>
 <div class="modal-body form">
  <label>選擇老師<select id="recordTeacher" required></select></label>
  <label>選擇日期與時段<select id="recordSlot" required></select></label>
  <label>今天負責聲部／學生<div class="checks" id="checks"></div></label>
  <label>其他補充<input id="partOther" placeholder="例：A組三位學生、臨時低音組"></label>
  <label>今天實際教了什麼<textarea id="content" placeholder="例：帶高音笛一部練第1-16小節。"></textarea></label>
  <label>目前教到哪裡／完成狀況<textarea id="progress" placeholder="例：第1-12小節可接伴奏，第13-16小節仍需慢練。"></textarea></label>
  <label>學生狀況<textarea id="statusText" placeholder="例：音準偏高，換氣點不一致。"></textarea></label>
  <label>交代下一位老師要接的進度<textarea id="handoff" placeholder="例：請下一位老師從第13小節開始慢練。"></textarea></label>
  <label>狀態<select id="state"><option>未完成</option><option selected>部分完成</option><option>已完成</option></select></label>
 </div>
 <div class="actions"><button type="submit">送出到老師方塊</button></div>
</form>
</dialog>

<dialog id="exportDialog">
 <div class="modal-head"><div class="row"><h2>匯出交接紀錄</h2><button class="secondary" onclick="exportDialog.close()">關閉</button></div></div>
 <div class="modal-body"><pre id="exportText" style="white-space:pre-wrap;background:#2b2620;color:white;border-radius:14px;padding:12px;font-size:12px;overflow:auto"></pre></div>
 <div class="actions"><button id="copyBtn">複製</button></div>
</dialog>

<script>
const DAYS=["週一","週二","週三","週四","週五","週六","週日"];
const BASIC=[["morning","早自習","上午"],["noon","中午練習","中午"]];
const FRI=[["club","社團課","13:00–15:00"],["extra","加強課","17:00–17:30"]];
const PARTS=["高音笛一部","高音笛二部","中音笛","次中音笛","低音笛","個別學生","臨時分組","其他"];
let monday=getMonday(new Date());let active=(new Date().getDay()||7)-1;let editTeacherId=null;
const $=id=>document.getElementById(id);
function pad(n){return String(n).padStart(2,"0")}function iso(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function weekNumber(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-yearStart)/86400000)+1)/7)}
function weekdayLabel(i){return ["一","二","三","四","五","六","日"][i]}
function fullDate(i){const d=add(monday,i);return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${weekdayLabel(i)}）`}
function getMonday(date){const d=new Date(date);d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()-day+(day===0?-6:1));return d}
function add(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}function fmt(i){const d=add(monday,i);return `${d.getMonth()+1}/${d.getDate()}`}
function key(){return "zz-teacher-wall-v3:"+iso(monday)}function load(){let data=JSON.parse(localStorage.getItem(key())||'{"plan":{},"teachers":[],"records":[]}');return data}
function save(data){localStorage.setItem(key(),JSON.stringify(data));render()}function esc(s=""){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function slots(i){return i===4?BASIC.concat(FRI):BASIC}function slotId(i,k){return `${iso(add(monday,i))}_${k}`}function slotName(i,k){const s=slots(i).find(x=>x[0]===k);return s?`${fullDate(i)}｜${s[1]} ${s[2]}`:""}
function allSlots(){let a=[];DAYS.forEach((d,i)=>slots(i).forEach(s=>a.push({dayIndex:i,slotKey:s[0],label:slotName(i,s[0])})));return a}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function hasPlan(p){return p.goal||p.overall||p.pieces||p.notes}
function renderChecks(){ $("checks").innerHTML=PARTS.map(p=>`<label class="check"><input type="checkbox" value="${esc(p)}">${esc(p)}</label>`).join("")}
function noteCard(r,compact=false){return `<div class="note ${r.handoff?'handoff':''}">
 <div class="note-meta"><b>第${weekNumber(monday)}週｜${esc(slotName(r.dayIndex,r.slotKey))}</b><br>填寫時間：${esc(r.createdAt||"")}</div>
 <p><b>聲部／學生：</b>${esc(r.parts||"未填")}</p>
 ${compact?"":`<p><b>今天教學：</b>${esc(r.content||"未填")}</p><p><b>目前進度：</b>${esc(r.progress||"未填")}</p>${r.statusText?`<p><b>學生狀況：</b>${esc(r.statusText)}</p>`:""}`}
 <p><b>交代下一位：</b>${esc(r.handoff||"未填")}</p>
 <span class="badge ${r.state==="已完成"?"green":"orange"}">${esc(r.state||"")}</span>
 </div>`}
function render(){
 const data=load();const end=add(monday,6);
 const weekText=`第${weekNumber(monday)}週｜${monday.getFullYear()}/${monday.getMonth()+1}/${monday.getDate()}（一）～${end.getFullYear()}/${end.getMonth()+1}/${end.getDate()}（日）`;
 $("weekLabel").textContent=weekText;
 if($("bigWeekLabel")) $("bigWeekLabel").textContent=weekText;
 if($("bigWeekBadge")) $("bigWeekBadge").textContent=`${monday.getFullYear()} 年`;
 $("planStatus").textContent=hasPlan(data.plan)?"已填寫":"尚未填寫";$("planStatus").className="badge "+(hasPlan(data.plan)?"green":"");
 $("planView").className=hasPlan(data.plan)?"":"empty";
 $("planView").innerHTML=hasPlan(data.plan)?`${data.plan.goal?`<p><b>本週目標：</b>${esc(data.plan.goal)}</p>`:""}${data.plan.overall?`<p><b>目前整體進度：</b>${esc(data.plan.overall)}</p>`:""}${data.plan.pieces?`<p><b>主要曲目／段落：</b>${esc(data.plan.pieces)}</p>`:""}${data.plan.notes?`<p><b>提醒：</b>${esc(data.plan.notes)}</p>`:""}${data.plan.teacher?`<p class="muted">填寫老師：${esc(data.plan.teacher)}</p>`:""}`:"主要教學老師尚未填寫本週大綱。";
 $("teacherCount").textContent=`${data.teachers.length} 位老師`;
 $("teacherWall").innerHTML=data.teachers.length?data.teachers.map(t=>{
  const recs=data.records.filter(r=>r.teacherId===t.id).sort((a,b)=>(b.ts||0)-(a.ts||0));
  return `<div class="teacher-card">
   <div class="teacher-head"><div><div class="teacher-name">${esc(t.name)}</div>${t.note?`<div class="muted">${esc(t.note)}</div>`:""}<span class="badge green">${recs.length} 筆紀錄</span></div>
   <div class="teacher-actions"><button onclick="openRecord('${t.id}')">新增紀錄</button><button class="secondary" onclick="editTeacher('${t.id}')">修改</button><button class="danger" onclick="deleteTeacher('${t.id}')">刪除</button></div></div>
   <div>${recs.length?recs.slice(0,4).map(r=>noteCard(r)).join(""):'<div class="empty" style="margin-top:8px">這位老師目前還沒有教學紀錄。</div>'}</div>
  </div>`}).join(""):`<div class="empty">尚未新增老師。請先點「新增老師」，建立每位老師的方塊。</div>`;
 const sorted=[...data.records].sort((a,b)=>(b.ts||0)-(a.ts||0));
 const handoffs=sorted.filter(r=>r.handoff);
 $("handoffList").innerHTML=handoffs.length?handoffs.slice(0,8).map(r=>{const t=data.teachers.find(x=>x.id===r.teacherId);return `<div class="note handoff"><div class="note-meta">${esc(t?t.name:"未找到老師")}｜第${weekNumber(monday)}週｜${esc(slotName(r.dayIndex,r.slotKey))}</div><p>${esc(r.handoff)}</p></div>`}).join(""):`<div class="empty">目前還沒有交接提醒。</div>`;
 $("tabs").innerHTML=DAYS.map((d,i)=>`<button class="tab ${i===active?'active':''}" onclick="active=${i};render()">${fmt(i)}（${weekdayLabel(i)}）</button>`).join("");
 const all=allSlots();const filled=new Set(data.records.map(r=>slotId(r.dayIndex,r.slotKey)));$("slotCount").textContent=all.length;$("doneCount").textContent=filled.size;$("todoCount").textContent=all.length-filled.size;
 $("slotList").innerHTML=slots(active).map(s=>{const recs=sorted.filter(r=>r.dayIndex===active&&r.slotKey===s[0]);return `<div class="slot"><div class="slot-top"><div><h3>${esc(s[1])}｜${esc(s[2])}</h3><div class="muted">第${weekNumber(monday)}週｜${fullDate(active)}</div></div><span class="badge ${recs.length?'green':''}">${recs.length?recs.length+"筆":"未填"}</span></div><div style="margin-top:8px">${recs.length?recs.map(r=>{const t=data.teachers.find(x=>x.id===r.teacherId);return `<div class="note"><div class="note-meta">${esc(t?t.name:"未找到老師")}</div>${noteCard(r,true)}</div>`}).join(""):'<div class="empty">此時段尚未填寫。</div>'}</div><button style="margin-top:8px" onclick="openRecord(null,${active},'${s[0]}')">填寫這個時段</button></div>`}).join("");
}
function fillRecordOptions(teacherId=null,dayIndex=active,slotKey=null){
 const data=load();$("recordTeacher").innerHTML=data.teachers.map(t=>`<option value="${t.id}" ${t.id===teacherId?"selected":""}>${esc(t.name)}</option>`).join("");
 $("recordSlot").innerHTML=allSlots().map(s=>`<option value="${s.dayIndex}|${s.slotKey}" ${s.dayIndex===dayIndex && (!slotKey||s.slotKey===slotKey)?"selected":""}>${esc(s.label)}</option>`).join("");
}
window.openRecord=(teacherId=null,dayIndex=active,slotKey=null)=>{const data=load();if(!data.teachers.length){alert("請先新增老師，才知道這筆紀錄是誰填的。");openTeacher();return}fillRecordOptions(teacherId,dayIndex,slotKey);$("partOther").value="";$("content").value="";$("progress").value="";$("statusText").value="";$("handoff").value="";$("state").value="部分完成";renderChecks();recordDialog.showModal()}
function openTeacher(t=null){editTeacherId=t?t.id:null;$("teacherDialogTitle").textContent=t?"修改老師":"新增老師";$("teacherNameInput").value=t?t.name:"";$("teacherNoteInput").value=t?t.note:"";teacherDialog.showModal()}
$("addTeacherBtn").onclick=()=>openTeacher();
window.editTeacher=(id)=>{const t=load().teachers.find(x=>x.id===id);if(t)openTeacher(t)}
window.deleteTeacher=(id)=>{const data=load();const t=data.teachers.find(x=>x.id===id);if(!t)return;if(confirm(`確定刪除「${t.name}」嗎？這位老師的紀錄也會一起刪除。`)){data.teachers=data.teachers.filter(x=>x.id!==id);data.records=data.records.filter(r=>r.teacherId!==id);save(data)}}
$("teacherForm").onsubmit=e=>{e.preventDefault();const data=load();if(editTeacherId){const t=data.teachers.find(x=>x.id===editTeacherId);if(t){t.name=$("teacherNameInput").value.trim();t.note=$("teacherNoteInput").value.trim()}}else{data.teachers.push({id:uid(),name:$("teacherNameInput").value.trim(),note:$("teacherNoteInput").value.trim()})}save(data);teacherDialog.close()}
$("recordForm").onsubmit=e=>{e.preventDefault();const data=load();const [dayIndex,slotKey]=$("recordSlot").value.split("|");const selected=[...$("checks").querySelectorAll("input:checked")].map(x=>x.value).filter(x=>x!=="其他");const other=$("partOther").value.trim();data.records.push({id:uid(),teacherId:$("recordTeacher").value,dayIndex:+dayIndex,slotKey,parts:selected.concat(other?[other]:[]).join("、"),content:$("content").value.trim(),progress:$("progress").value.trim(),statusText:$("statusText").value.trim(),handoff:$("handoff").value.trim(),state:$("state").value,createdAt:new Date().toLocaleString("zh-TW"),ts:Date.now()});save(data);recordDialog.close()}
$("openPlan").onclick=()=>{const p=load().plan;$("goal").value=p.goal||"";$("overall").value=p.overall||"";$("pieces").value=p.pieces||"";$("notes").value=p.notes||"";$("planTeacher").value=p.teacher||"";planDialog.showModal()}
$("planForm").onsubmit=e=>{e.preventDefault();const data=load();data.plan={goal:$("goal").value.trim(),overall:$("overall").value.trim(),pieces:$("pieces").value.trim(),notes:$("notes").value.trim(),teacher:$("planTeacher").value.trim()};save(data);planDialog.close()}
$("prevWeek").onclick=()=>{monday=add(monday,-7);render()} $("nextWeek").onclick=()=>{monday=add(monday,7);render()} $("quickAdd").onclick=()=>openRecord()
$("clearBtn").onclick=()=>{if(confirm("確定清除本週資料？")){localStorage.removeItem(key());render()}}
function exportText(){const d=load();let t=`中正國小直笛團｜教師交接紀錄\n第${weekNumber(monday)}週：${iso(monday)}～${iso(add(monday,6))}\n\n【本週總進度】\n目標：${d.plan.goal||"未填"}\n目前進度：${d.plan.overall||"未填"}\n曲目：${d.plan.pieces||"未填"}\n提醒：${d.plan.notes||"未填"}\n\n【老師紀錄】\n`;d.teachers.forEach(te=>{t+=`\n【${te.name}】${te.note?` ${te.note}`:""}\n`;const rs=d.records.filter(r=>r.teacherId===te.id).sort((a,b)=>(a.ts||0)-(b.ts||0));if(!rs.length)t+="尚無紀錄\n";rs.forEach((r,n)=>{t+=`${n+1}. ${slotName(r.dayIndex,r.slotKey)}\n聲部／學生：${r.parts}\n今天教學：${r.content}\n目前進度：${r.progress}\n學生狀況：${r.statusText}\n交代下一位老師：${r.handoff}\n狀態：${r.state}\n`})});return t}
$("exportBtn").onclick=()=>{$("exportText").textContent=exportText();exportDialog.showModal()} $("copyBtn").onclick=async()=>{await navigator.clipboard.writeText($("exportText").textContent);$("copyBtn").textContent="已複製";setTimeout(()=>$("copyBtn").textContent="複製",1000)}
renderChecks();render();
</script>
</body>
